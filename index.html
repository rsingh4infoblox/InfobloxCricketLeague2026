<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICL - Infoblox Cricket League</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Decorative cricket-themed background -->
    <div class="bg-decoration">
        <div class="cricket-seam seam-1"></div>
        <div class="cricket-seam seam-2"></div>
    </div>

    <div class="container hero-container">
        <!-- Logo & Branding -->
        <div class="logo-section">
            <div class="logo-badge">
                <img src="logo-icon.svg" alt="Infoblox Logo" class="logo-icon">
            </div>
            <h1 class="brand-title">INFOBLOX<br><span class="brand-highlight">CRICKET LEAGUE</span></h1>
            <div class="brand-divider"></div>
            <p class="brand-subtitle">Season 2026 &bull; Player Directory</p>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-wrapper">
                <div class="search-icon-wrapper">
                    <svg class="search-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </div>
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Search player by name..." 
                    autocomplete="off"
                >
                <span class="clear-btn" id="clearBtn" title="Clear">&times;</span>
            </div>
            <!-- Search Results Dropdown -->
            <div class="search-results" id="searchResults"></div>
        </div>

        <!-- Cricket-themed stats bar -->
        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <div class="stat-icon">&#127951;</div>
                <div class="stat-number" id="totalPlayers">0</div>
                <div class="stat-label">Players</div>
            </div>
            <div class="stat-item">
                <div class="stat-icon">&#127942;</div>
                <div class="stat-number">2026</div>
                <div class="stat-label">Season</div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <img src="logo-icon.svg" alt="Infoblox" class="footer-logo">
            <p>&copy; 2026 Infoblox Cricket League. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/csv-parser.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
