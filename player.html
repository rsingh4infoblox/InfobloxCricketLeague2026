<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Details - ICL</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="detail-page">
    <div class="bg-decoration">
        <div class="cricket-seam seam-1"></div>
        <div class="cricket-seam seam-2"></div>
    </div>

    <!-- Top Nav Bar -->
    <nav class="top-nav">
        <a href="index.html" class="nav-brand">
            <img src="logo-icon.svg" alt="ICL" class="nav-logo">
            <span class="nav-title">ICL</span>
        </a>
        <a href="index.html" class="back-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back to Search
        </a>
    </nav>

    <div class="container detail-container">
        <!-- Loading State -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading player details...</p>
        </div>

        <!-- Error State -->
        <div class="error-message" id="errorMessage" style="display: none;">
            <div class="error-icon">&#128531;</div>
            <h2>Player Not Found</h2>
            <p>The player you're looking for could not be found.</p>
            <a href="index.html" class="btn-primary">Go Back to Search</a>
        </div>

        <!-- Player Details Card -->
        <div class="player-detail-card" id="playerCard" style="display: none;">
            <div class="player-detail-top">
                <div class="player-photo-large">
                    <img id="playerPhoto" src="" alt="Player Photo">
                </div>
                <div class="player-name-section">
                    <h1 id="playerName" class="player-full-name"></h1>
                    <span id="playerGender" class="player-badge"></span>
                </div>
            </div>
            <div class="player-info-grid">
                <div class="info-card">
                    <div class="info-icon">&#128100;</div>
                    <div class="info-label">First Name</div>
                    <div class="info-value" id="firstName"></div>
                </div>
                <div class="info-card">
                    <div class="info-icon">&#128101;</div>
                    <div class="info-label">Last Name</div>
                    <div class="info-value" id="lastName"></div>
                </div>
                <div class="info-card">
                    <div class="info-icon">&#9895;</div>
                    <div class="info-label">Gender</div>
                    <div class="info-value" id="gender"></div>
                </div>
                <div class="info-card">
                    <div class="info-icon">&#128197;</div>
                    <div class="info-label">Age</div>
                    <div class="info-value" id="age"></div>
                </div>
            </div>
            <div class="description-section">
                <h3 class="description-label">&#128221; About</h3>
                <p class="description-text" id="description"></p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <img src="logo-icon.svg" alt="Infoblox" class="footer-logo">
            <p>&copy; 2026 Infoblox Cricket League. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/csv-parser.js"></script>
    <script src="js/player.js"></script>
</body>
</html>
